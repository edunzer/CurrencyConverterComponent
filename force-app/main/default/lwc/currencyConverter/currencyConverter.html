<template>
	<div class="slds-box slds-theme_default">
		<lightning-input
			type="number"
			label="Enter Amount"
			value={amount}
			onchange={handleAmountChange}
			step="0.01"
			min="0"
			required
		></lightning-input>

		<div class="slds-m-top_medium">
			<lightning-layout multiple-rows>
				<lightning-layout-item size="12">
					<lightning-combobox
						name="fromCurrency"
						label="From Currency"
						placeholder="From"
						value={fromCurrency}
						options={currencyOptions}
						onchange={handleFromChange}
					></lightning-combobox>
				</lightning-layout-item>
				<lightning-layout-item size="12" class="slds-align_absolute-center slds-p-vertical_small">
					<lightning-button-icon
						icon-name="utility:change_record_type"
						alternative-text="Swap"
						title="Swap currencies"
						onclick={handleSwap}
						variant="border-filled"
						size="medium"
					></lightning-button-icon>
				</lightning-layout-item>
				<lightning-layout-item size="12">
					<lightning-combobox
						name="toCurrency"
						label="To Currency"
						placeholder="To"
						value={toCurrency}
						options={currencyOptions}
						onchange={handleToChange}
					></lightning-combobox>
				</lightning-layout-item>
			</lightning-layout>
		</div>

		<div class="slds-grid slds-grid_align-center slds-m-top_medium">
			<div class="slds-col">
				<lightning-button
					label="Calculate"
					onclick={handleCalculate}
					disabled={isCalculateDisabled}
					variant="brand"
					class="slds-button_stretch slds-size_medium"
					style="min-width: 200px;"
				></lightning-button>
			</div>
			<template if:true={loading}>
				<div class="slds-col slds-m-left_small">
					<lightning-spinner size="small"></lightning-spinner>
				</div>
			</template>
		</div>

		<template if:true={result}>
			<div class="slds-m-top_medium slds-text-heading_small">
				{result.from} {result.fromIso} = {result.to} {result.toIso}
			</div>
		</template>
		<template if:true={error}>
			<div class="slds-m-top_medium slds-text-color_error">
				{error}
			</div>
		</template>
	</div>
</template>
